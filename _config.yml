# Hackathon
hackathonTitle: "Field Work"
enableHackathon: true

# Hackathon About Block
aboutHackathonTitle: "Field Work Projects"
hackathonRows:
 - {title: "Overview", image: "", details: "There is need to not only develop data science capacity in Africa but to also harness that capacity to address African Challenges. In this regard DSA is proposing to run a 6 month hackathon to provide the Summer School and Workshop participants with an opportunity to put their skills into practice as well as to establish collaborations across different African countries for Data Science projects. In summary the hackathon is about; <strong><em>African Problems being solved by African Data Scientists using African Data</em></strong>"} 
 - {title: "The Process", image: "", details: "<h5>Participants will be expected to do the following</h5> <ol><li>Identify a problem facing an African country or community</li><li>Form teams of max 5 members from different African countries</li><li>Collect existing or new data on the African continent</li></ol> <h5>Step 1 - DSA 2024 </h5><ol><li>The data science process</li><li>Team formation</li><li>Problem identification </li></ol><h5>Step 2 - Post DSA: June – November 2024 </h5><ol><li>Data Collection</li><li>Solution Development</li><li>Two checkpoints – July & September 2024</li><li>Final Presentations – November 2024 </li></ol>"}
 - {title: "Motivation", image: "", details: "<ol><li>African problems solved by African Data Scientists with African Data</li><li>Top 5 teams automatically selected to attend DSA 2024 … travel grants will be considered</li></ol>"}
 - {title: "FAQ", image: "", details: "<ol><li><strong>Is there funding for these projects?</strong> … Teams are encouraged to also find ways of financing the solution development from grants etc. </li><li><strong>Can team members be persons who are not at DSA 2024?</strong> … Yes, as long as one team member has attended DSA 2024 </li><li><strong>What if we run out of options for team members from other countries?</strong> … Be creative, the point is to collaborate across borders and institutions</li></ol>"}


